name: Template Release

on:
  workflow_call:
    inputs:
      target:
        description: Build target directory name
        required: true
        type: string
      tag:
        description: Release tag name
        required: true
        type: string
      upload_release:
        description: Upload selected binary to GitHub Release
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: sh scripts/release-guard.sh "${{ inputs.target }}" "${{ inputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache source downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.tmp
          key: tmp-${{ inputs.target }}-${{ hashFiles('metadata.json', 'scripts/download.sh', 'scripts/metadata.sh', 'scripts/common.sh') }}
          restore-keys: |-
            tmp-${{ inputs.target }}-

      - name: Resolve release metadata
        id: metadata
        run: |-
          RELEASE_FILES="$(sh scripts/metadata.sh get-release-files "${{ inputs.target }}")"
          ARTIFACT_PATHS=""

          printf '%s\n' "${RELEASE_FILES}" | while IFS= read -r release_file; do
            if [ -z "${release_file}" ]; then
              continue
            fi
            ARTIFACT_PATHS="${ARTIFACT_PATHS}.out/${release_file}\n"
          done

          {
            echo 'release_files<<EOF'
            printf '%s\n' "${RELEASE_FILES}"
            echo 'EOF'
            echo 'artifact_paths<<EOF'
            printf '%b' "${ARTIFACT_PATHS}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build target
        env:
          BUILDKIT_CACHE_BACKEND: gha
          BUILD_OUTPUT_DEST: ${{ github.workspace }}/.out/${{ inputs.target }}
        run: make build ${{ inputs.target }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.out/${{ inputs.target }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload selected release files artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.target }}-static-build
          path: ${{ steps.metadata.outputs.artifact_paths }}
          if-no-files-found: error
          retention-days: 30

      - name: Create release package
        if: ${{ inputs.upload_release }}
        run: |-
          TAG="${{ inputs.tag }}"
          PACKAGE_NAME="${TAG}.tar.gz"
          RELEASE_PATHS=()

          rm -f "${PACKAGE_NAME}"

          printf '%s\n' "${{ steps.metadata.outputs.release_files }}" | while IFS= read -r release_file; do
            if [ -z "${release_file}" ]; then
              continue
            fi

            if [ -f ".out/${release_file}" ] || [ -d ".out/${release_file}" ]; then
              RELEASE_PATHS+=("${release_file}")
            else
              echo "Error: Release path not found at .out/${release_file}"
              exit 1
            fi
          done

          if [ "${#RELEASE_PATHS[@]}" -eq 0 ]; then
            echo "Error: No release files provided"
            exit 1
          fi

          tar -czvf "${PACKAGE_NAME}" -C .out "${RELEASE_PATHS[@]}"

      - name: Publish assets to release
        if: ${{ inputs.upload_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          TAG="${{ inputs.tag }}"
          PACKAGE_NAME="${TAG}.tar.gz"

          if [ ! -f "${PACKAGE_NAME}" ]; then
            echo "Error: Release package not found at ${PACKAGE_NAME}"
            exit 1
          fi

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated static binary release from tag ${TAG}."
          fi

          gh release upload "${TAG}" "${PACKAGE_NAME}" --clobber
