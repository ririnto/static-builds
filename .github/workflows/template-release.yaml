name: Template Release

on:
  workflow_call:
    inputs:
      target:
        description: Build target directory name
        required: true
        type: string
      tag:
        description: Release tag name
        required: true
        type: string
      upload_release:
        description: Upload selected binary to GitHub Release
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: sh scripts/release-guard.sh "${{ inputs.target }}" "${{ inputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache source downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.tmp
          key: tmp-${{ inputs.target }}-${{ hashFiles('metadata.json', 'scripts/download.sh', 'scripts/metadata.sh', 'scripts/common.sh', 'scripts/package-release.sh') }}
          restore-keys: |-
            tmp-${{ inputs.target }}-

      - name: Resolve release metadata
        id: metadata
        run: |-
          RELEASE_FILES="$(sh scripts/metadata.sh get-release-files "${{ inputs.target }}")"

          if [ -z "${RELEASE_FILES}" ]; then
            echo "Error: No release files configured for ${{ inputs.target }}"
            exit 1
          fi

          {
            echo 'release_files<<EOF'
            printf '%s\n' "${RELEASE_FILES}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build target
        env:
          BUILDKIT_CACHE_BACKEND: gha
          BUILD_OUTPUT_DEST: ${{ github.workspace }}/.out/${{ inputs.target }}
        run: make build ${{ inputs.target }}

      - name: Verify release files exist
        run: |-
          RELEASE_FILES="$(sh scripts/metadata.sh get-release-files "${{ inputs.target }}")"

          if [ -z "${RELEASE_FILES}" ]; then
            echo "Error: No release files configured for ${{ inputs.target }}"
            exit 1
          fi

          for release_file in ${RELEASE_FILES}; do
            RELEASE_PATH=".out/${{ inputs.target }}/${release_file}"
            if [ ! -f "${RELEASE_PATH}" ] && [ ! -d "${RELEASE_PATH}" ]; then
              echo "Error: Release path not found at ${RELEASE_PATH}"
              exit 1
            fi
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.out/${{ inputs.target }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Create release package
        env:
          TARGET: ${{ inputs.target }}
          TAG: ${{ inputs.tag }}
        run: sh scripts/package-release.sh "$TARGET" "$TAG"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.target }}-static-build
          path: |-
            .out/${{ inputs.target }}/
            ${{ inputs.tag }}.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Publish assets to release
        if: ${{ inputs.upload_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          TAG="${{ inputs.tag }}"
          PACKAGE_NAME="${TAG}.tar.gz"

          if [ ! -f "${PACKAGE_NAME}" ]; then
            echo "Error: Release package not found at ${PACKAGE_NAME}"
            exit 1
          fi

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated static binary release from tag ${TAG}."
          fi

          gh release upload "${TAG}" "${PACKAGE_NAME}" --clobber
