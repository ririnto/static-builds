name: Template Release

on:
  workflow_call:
    inputs:
      target:
        description: Build target directory name
        required: true
        type: string
      tag:
        description: Release tag name
        required: true
        type: string
      upload_release:
        description: Upload selected binary to GitHub Release
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag
        run: sh .github/scripts/release-guard.sh "${{ inputs.target }}" "${{ inputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache source downloads
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.tmp
          key: >-
            tmp-${{ inputs.target }}-${{ hashFiles('metadata.json',
            'scripts/download.sh', 'scripts/metadata.sh',
            'scripts/package-release.sh') }}
          restore-keys: >-
            tmp-${{ inputs.target }}-

      - name: Build target
        env:
          BUILDKIT_CACHE_BACKEND: gha
          BUILD_OUTPUT_DEST: ${{ github.workspace }}/.out/${{ inputs.target }}
          TARGET: ${{ inputs.target }}
        run: |-
          sh scripts/download.sh "$TARGET"
          sh .github/scripts/build.sh "$TARGET"

      - name: Verify release files exist
        env:
          TARGET: ${{ inputs.target }}
        run: |-
          RELEASE_FILES="$(sh scripts/metadata.sh get-release-files "$TARGET")"
          test -n "${RELEASE_FILES}" || { echo "Error: No release files for ${TARGET}" >&2; exit 1; }
          for f in ${RELEASE_FILES}; do
            test -f ".out/${TARGET}/${f}" -o -d ".out/${TARGET}/${f}" \
              || { echo "Error: ${f} not found in .out/${TARGET}" >&2; exit 1; }
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.out/${{ inputs.target }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Create release package
        env:
          TARGET: ${{ inputs.target }}
          TAG: ${{ inputs.tag }}
        run: sh scripts/package-release.sh "$TARGET" "$TAG"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.target }}-static-build
          path: .out/${{ inputs.target }}
          include-hidden-files: true

      - name: Publish assets to release
        if: ${{ inputs.upload_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          TAG="${{ inputs.tag }}"
          PACKAGE_NAME="${TAG}.tar.gz"
          test -f "${PACKAGE_NAME}" || { echo "Error: ${PACKAGE_NAME} not found" >&2; exit 1; }
          gh release view "${TAG}" >/dev/null 2>&1 \
            || gh release create "${TAG}" --title "${TAG}" --notes "Automated static binary release from tag ${TAG}."
          gh release upload "${TAG}" "${PACKAGE_NAME}" --clobber
