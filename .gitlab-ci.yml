stages:
  - prepare
  - package

generate-package-pipeline:
  stage: prepare
  image: alpine:3.23
  before_script:
    - apk add --no-cache bash
  script:
    - test -n "$TARGET"
    - sh scripts/generate-gitlab-child-pipeline.sh "$TARGET" "${PACKAGE_VERSION:-}" > generated-package-pipeline.yml
  artifacts:
    paths:
      - generated-package-pipeline.yml
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
      when: manual
    - when: never

run-package-pipeline:
  stage: package
  trigger:
    include:
      - artifact: generated-package-pipeline.yml
        job: generate-package-pipeline
    strategy: mirror
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
      when: manual
    - when: never
