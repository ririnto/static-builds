stages:
  - prepare
  - package

generate-package-pipeline:
  stage: prepare
  image: golang:1.26.2
  script:
    - export PATH="/usr/local/go/bin:${GOPATH:-/go}/bin:$PATH"
    - go install github.com/google/go-jsonnet/cmd/jsonnet@latest
    - |-
      jsonnet -S \
        --ext-str "branch=${CI_COMMIT_BRANCH:-}" \
        --ext-str "target=" \
        .gitlab/ci/package-pipeline.jsonnet \
        > package-pipeline.yaml
  artifacts:
    paths:
      - package-pipeline.yaml
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
    - when: never

run-package-pipeline:
  stage: package
  trigger:
    include:
      - artifact: package-pipeline.yaml
        job: generate-package-pipeline
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
    - when: never
