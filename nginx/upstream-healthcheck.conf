# Verify-only config to test runtime lua-resty-upstream-healthcheck module
# This config is NOT shipped with the release - it's only for build verification

error_log stderr notice;
pid /tmp/nginx.pid;

events {
}

http {
    lua_shared_dict healthcheck 1m;

    init_by_lua_block {
        local ok, core_or_err = pcall(require, "resty.core")
        if not ok then
            error("resty.core load probe failed: " .. tostring(core_or_err))
        end

        local ok_shdict, set_err = pcall(function()
            local dict = ngx.shared.healthcheck
            assert(dict, "healthcheck dict missing")
            assert(dict:add("probe", 1), "dict add failed")
            local value = dict:get("probe")
            assert(value == 1, "dict get returned unexpected value")
            local incremented = dict:incr("probe", 1)
            assert(incremented == 2, "dict incr returned unexpected value")
            assert(dict:set("probe", 5), "dict set failed")
            assert(dict:get("probe") == 5, "dict set/get mismatch")
            dict:delete("probe")
        end)
        if not ok_shdict then
            error("shared dict probe failed: " .. tostring(set_err))
        end

        local from, to, re_err = ngx.re.find("HTTP/1.1 200 OK", [[^HTTP/\d+\.\d+\s+(\d+)]], "joi", nil, 1)
        if from ~= 10 or to ~= 12 or re_err then
            error("ngx.re.find status probe failed: from=" .. tostring(from)
                .. ", to=" .. tostring(to)
                .. ", err=" .. tostring(re_err))
        end

        local host_from, host_to, host_err = ngx.re.find("backend.internal:443", [[^(.*):\d+$]], "jo", nil, 1)
        if host_from ~= 1 or host_to ~= 16 or host_err then
            error("ngx.re.find host probe failed: from=" .. tostring(host_from)
                .. ", to=" .. tostring(host_to)
                .. ", err=" .. tostring(host_err))
        end

        local unsupported_from, unsupported_to, unsupported_err = ngx.re.find("HTTP/1.1 200 OK", [[^HTTP]], "jo", nil, 1)
        if unsupported_from ~= nil or unsupported_to ~= nil
            or unsupported_err ~= "unsupported regex"
        then
            error("ngx.re.find unsupported probe failed: from="
                .. tostring(unsupported_from)
                .. ", to=" .. tostring(unsupported_to)
                .. ", err=" .. tostring(unsupported_err))
        end

        local ok, mod_or_err = pcall(require, "resty.upstream.healthcheck")
        if not ok then
            error("healthcheck module load probe failed: " .. tostring(mod_or_err))
        end

        local mod = mod_or_err
        if type(mod) ~= "table" then
            error("healthcheck module load probe returned unexpected value: " .. tostring(mod))
        end

        package.loaded["resty.upstream.healthcheck"] = mod
        ngx.log(ngx.ALERT, "healthcheck module runtime probes passed")
    }
}
