spec:
  inputs:
    stage:
      default: release
    target:
      type: string
    package_name:
      type: string
    when:
      default: on_success
---
"gitlab-static-package-$[[ inputs.target ]]":
  stage: $[[ inputs.stage ]]
  rules:
    - when: $[[ inputs.when ]]
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
    BUILDKIT_CACHE_BACKEND: local
    BUILD_OUTPUT_DEST: "$CI_PROJECT_DIR/.out/$[[ inputs.target ]]"
  script:
    - sh scripts/download.sh "$[[ inputs.target ]]"
    - sh scripts/build-rootless.sh "$[[ inputs.target ]]"
    - sh scripts/package-release.sh "$[[ inputs.target ]]" "$[[ inputs.package_name ]]"
  artifacts:
    paths:
      - ".out/$[[ inputs.target ]]/"
      - "$[[ inputs.package_name ]].tar.gz"
    when: always
