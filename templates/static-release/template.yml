spec:
  inputs:
    stage:
      default: release
    target:
      type: string
    tag:
      type: string
    upload_release:
      type: boolean
      default: true
---
"gitlab-static-release-$[[ inputs.target ]]":
  stage: $[[ inputs.stage ]]
  image: alpine:3.23
  services:
    - name: docker:27.1-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    BUILDKIT_CACHE_BACKEND: local
    BUILD_OUTPUT_DEST: "$CI_PROJECT_DIR/.out/$[[ inputs.target ]]"
  before_script:
    - apk add --no-cache docker-cli docker-cli-buildx make git curl bash
  script:
    - sh scripts/release-guard.sh "$[[ inputs.target ]]" "$[[ inputs.tag ]]"
    - make build "$[[ inputs.target ]]"
    - sh scripts/package-release.sh "$[[ inputs.target ]]" "$[[ inputs.tag ]]"
  artifacts:
    paths:
      - ".out/$[[ inputs.target ]]/"
      - "$[[ inputs.tag ]].tar.gz"
    when: always
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
  release:
    tag_name: $[[ inputs.tag ]]
    description: "Automated static binary release from tag $[[ inputs.tag ]]."
