spec:
  inputs:
    stage:
      default: release
    target:
      type: string
    package_name:
      type: string
---
"gitlab-static-package-$[[ inputs.target ]]":
  stage: $[[ inputs.stage ]]
  image: alpine:3.23
  services:
    - name: docker:27.1-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    BUILDKIT_CACHE_BACKEND: local
    BUILD_OUTPUT_DEST: "$CI_PROJECT_DIR/.out/$[[ inputs.target ]]"
  before_script:
    - apk add --no-cache docker-cli docker-cli-buildx make git curl bash
  script:
    - make build "$[[ inputs.target ]]"
    - sh scripts/package-release.sh "$[[ inputs.target ]]" "$[[ inputs.package_name ]]"
  artifacts:
    paths:
      - ".out/$[[ inputs.target ]]/"
      - "$[[ inputs.package_name ]].tar.gz"
    when: always
    expire_in: 30 days
